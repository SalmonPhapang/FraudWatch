spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fraudwatch_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: fraud-check-group
      auto-offset-reset: earliest

logging:
  level:
    com.fraudwatch: DEBUG
    org.hibernate.SQL: DEBUG
